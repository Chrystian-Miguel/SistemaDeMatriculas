spring.application.name=sistemaAcademicoDeMatriculas

# =============================================
# CONFIGURA«√O DO BANCO DE DADOS (DOCKER)
# =============================================
# Conecta-se ao banco de dados MySQL rodando no container Docker
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_academico_de_matriculas?allowPublicKeyRetrieval=true&useSSL=false
# Credenciais definidas no arquivo docker-compose.yml
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# CONFIGURA«√O DO JPA/HIBERNATE
# =============================================
# "update": O Hibernate gerencia o schema automaticamente. Ideal para desenvolvimento.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# CONFIGURA«√O DO FLYWAY (se aplic·vel)
# =============================================
spring.flyway.locations=classpath:db/migration


