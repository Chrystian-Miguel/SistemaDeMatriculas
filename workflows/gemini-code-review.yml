name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Permissão necessária para o Gemini comentar no PR

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gemini Code Review
        uses: google-gemini/gemini-github-review-action@v1 # Action oficial ou da comunidade ativa
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: 'gemini-1.5-pro' # Modelo recomendado para análise de código
          prompt: 'Faça uma revisão deste código em português. Foque em bugs, boas práticas, segurança e performance.'
