<mat-toolbar color="primary">
  <span>{{ isEditMode ? 'Edit Class Section' : 'New Class Section' }}</span>
</mat-toolbar>

<mat-card class="form-card">
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Code</mat-label>
        <input matInput formControlName="code" required>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Total Slots</mat-label>
        <input matInput type="number" formControlName="totalSlots" required>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Subject</mat-label>
        <mat-select formControlName="subjectId" required>
          <mat-option *ngFor="let subject of subjects$ | async" [value]="subject.id">
            {{ subject.name }} ({{ subject.courseName }})
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field *ngIf="isEditMode" appearance="outline" class="full-width">
        <mat-label>Status</mat-label>
        <mat-select formControlName="status" required>
          <mat-option *ngFor="let status of statuses" [value]="status">
            {{ status }}
          </mat-option>
        </mat-select>
      </mat-form-field>

    </form>
  </mat-card-content>
  <mat-card-actions>
    <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="form.invalid">Save</button>
    <button mat-raised-button (click)="onCancel()">Cancel</button>
  </mat-card-actions>
</mat-card>
