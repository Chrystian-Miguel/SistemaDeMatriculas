<div class="student-list-container">
  <mat-toolbar color="primary">
    <span>Students</span>
    <span class="spacer"></span>
    <button mat-raised-button color="accent" routerLink="/students/new">
      <mat-icon>add</mat-icon>
      Add
    </button>

  </mat-toolbar>


  <div class="table-container" *ngIf="students$ | async as students; else loading">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search by name</mat-label>
      <input matInput [(ngModel)]="searchTerm" placeholder="Type to filter">
      <button *ngIf="searchTerm" matSuffix mat-icon-button (click)="searchTerm = ''" type="button">
        <mat-icon>close</mat-icon>
      </button>
    </mat-form-field>

    <table mat-table [dataSource]="filteredStudents" class="mat-elevation-z8">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let student"> {{student.name}} </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef> Email </th>
        <td mat-cell *matCellDef="let student"> {{student.email}} </td>
      </ng-container>

      <ng-container matColumnDef="academicRegistry">
        <th mat-header-cell *matHeaderCellDef> Academic Registry </th>
        <td mat-cell *matCellDef="let student"> {{student.academicRegistry}} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let student">
          <a mat-icon-button [routerLink]="['/students/edit', student.id]">
            <mat-icon>edit</mat-icon>
          </a>
          <button mat-icon-button color="warn" (click)="deleteStudent(student)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4">No data matching the filter</td>
      </tr>
    </table>
  </div>

  <ng-template #loading>
    <div class="loading-spinner">
      <mat-spinner></mat-spinner>
    </div>
  </ng-template>
</div>
