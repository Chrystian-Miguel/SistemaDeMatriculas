<div class="course-list-container">
  <mat-toolbar color="primary">
    <span>Courses</span>
    <span class="spacer"></span>
    <button mat-raised-button color="accent" (click)="onAdd()">
      <mat-icon>add</mat-icon>
      Add
    </button>
  </mat-toolbar>

  <div class="table-container" *ngIf="courses$ | async as courses; else loading">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search by name</mat-label>
      <input matInput [(ngModel)]="searchTerm" placeholder="Type to filter">
      <button *ngIf="searchTerm" matSuffix mat-icon-button (click)="searchTerm = ''" type="button">
        <mat-icon>close</mat-icon>
      </button>
    </mat-form-field>

    <table mat-table [dataSource]="filteredCourses" class="mat-elevation-z8">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let course">{{ course.name }}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let course">{{ course.description }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let course">
          <button mat-icon-button color="primary" (click)="onEdit(course)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="onDelete(course)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

  <ng-template #loading>
    <div class="loading-spinner">
      <mat-spinner></mat-spinner>
    </div>
  </ng-template>
</div>
